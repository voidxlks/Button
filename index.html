<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Repository</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f0f0f;
            color: white;
            text-align: center;
            padding: 40px;
        }

        h1 {
            margin-bottom: 30px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        button {
            padding: 15px 25px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        /* Button Styles */
        .btn-blue {
            background: #007bff;
            color: white;
        }

        .btn-blue:hover {
            background: #0056b3;
        }

        .btn-green {
            background: #28a745;
            color: white;
        }

        .btn-green:hover {
            background: #1e7e34;
        }

        .btn-red {
            background: #dc3545;
            color: white;
        }

        .btn-red:hover {
            background: #a71d2a;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid white;
            color: white;
        }

        .btn-outline:hover {
            background: white;
            color: black;
        }

        .btn-glow {
            background: purple;
            color: white;
            box-shadow: 0 0 10px purple;
        }

        .btn-glow:hover {
            box-shadow: 0 0 20px purple;
        }

        .footer {
            margin-top: 40px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <h1>🔥 Button Repository</h1>

    <div class="container">
        <button class="btn-blue">Blue Button</button>
        <button class="btn-green">Green Button</button>
        <button class="btn-red">Red Button</button>
        <button class="btn-outline">Outline Button</button>
        <button class="btn-glow">Glow Button</button>
    </div>

    <div class="footer">
        <p>Made by Void</p>
    </div>

</body>
</html>
