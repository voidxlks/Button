<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Button Prank</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    text-align: center;
}

button {
    padding: 15px 25px;
    font-size: 18px;
    margin-top: 100px;
    cursor: pointer;
    border: none;
    border-radius: 8px;
    background: red;
    color: white;
}

/* Fake virus screen */
#virusScreen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    color: red;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 9999;
}

#virusScreen h1 {
    font-size: 40px;
    margin-bottom: 20px;
}

#virusScreen p {
    font-size: 18px;
    color: white;
}

.closeBtn {
    margin-top: 20px;
    background: white;
    color: black;
}
</style>
</head>

<body>

<button onclick="startPrank()">Click Me</button>

<div id="virusScreen">
    <h1>⚠ WARNING ⚠</h1>
    <p>This is a FAKE virus screen (prank).</p>
    <p>Press ESC or click below to exit.</p>
    <button class="closeBtn" onclick="stopPrank()">Exit</button>
</div>

<script>
function startPrank() {
    document.getElementById("virusScreen").style.display = "flex";
}

// ESC key exits
document.addEventListener("keydown", function(e) {
    if (e.key === "Escape") {
        stopPrank();
    }
});

function stopPrank() {
    document.getElementById("virusScreen").style.display = "none";
}
</script>

</body>
</html>
